# Local-dev fat container for the BAM workspace.
#
# Builds a single image that runs Postgres + bam-poster + bam-reader
# under a supervisor entrypoint. Postgres is published on 127.0.0.1:5432
# so dev tooling (psql, demo apps) can talk to the same DB the services use.
#
# Quick start:
#   cp .env.docker.example .env.local      # fill in POSTER_*/READER_* values
#   pnpm db:up                              # build + start the container
#   pnpm db:down                            # stop (state preserved in volume)
#   pnpm db:reset                           # stop + drop the volume
#
# In production (fly.io) Postgres is NOT exposed — only 8787/8788 are.

services:
  bam:
    build:
      context: .
      dockerfile: Dockerfile
    image: bam-stack:local
    container_name: bam-stack
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: bam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/bam
      POSTER_HOST: 0.0.0.0
      POSTER_PORT: '8787'
      READER_HTTP_BIND: 0.0.0.0
      READER_HTTP_PORT: '8788'
      READER_DB_URL: postgres://postgres:postgres@127.0.0.1:5432/bam
    ports:
      - '127.0.0.1:5432:5432'
      - '127.0.0.1:8787:8787'
      - '127.0.0.1:8788:8788'
    volumes:
      - bam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bam']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  bam_postgres_data:
